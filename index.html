<!DOCTYPE html>
<meta charset="utf-8">
<title>Bibliothèque de Clémentine</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>td:first-child {text-align: center;}</style>

<table class="table table-hover table-dark table-striped">
    <thead>
        <tr>
            <th scope="col"></th>
            <th scope="col">
                <label for="title-search">Titre</label>
            </th>
            <th scope="col">
                <label for="authors-search">Auteur(s)</label>
            </th>
            <th scope="col">
                <label for="genres-search">Genres</label>
            </th>
            <th scope="col">
                Année
            </th>
            <th scope="col">
                <label for="comic-check">BD</label>
            </th>
            <th scope="col">
                <label for="read-check">Lu</label>
            </th>
        </tr>
        <tr>
            <td></td>
            <td>
                <input type="search" class="form-control" id="title-search" oninput="updateTable()">
            </td>
            <td>
                <input type="search" class="form-control" id="authors-search" oninput="updateTable()">
            </td>
            <td>
                <input type="search" class="form-control" id="genres-search" oninput="updateTable()">
            </td>
            <td>
                <div class="input-group">
                    <span class="input-group-text">Entre </span>
                    <input type="number" class="form-control" id="year-search-inf" aria-label="apres" oninput="updateTable()">
                    <span class="input-group-text"> et </span>
                    <input type="number" class="form-control" id="year-search-sup" aria-label="avant" oninput="updateTable()">
                </div>
            </td>
            <td>
                <input type="checkbox" class="form-check-input" id="comic-check" data-state="indeterminate" oninput="updateComicCheck(event, id='comic-check')">
            </td>
            <td>
                <input type="checkbox" class="form-check-input" id="read-check" data-state="indeterminate" oninput="updateComicCheck(event, id='read-check')">
            </td>
        </tr>
    </thead>
    <tbody id="ma-table">
    </tbody>
    <tfoot>
        <tr>
            <th scope="col">
                Nb lines
            </th>
            <th id="footer"></th>
        </tr>
    </tfoot>
</table>


<script>
    // Initialize boxes view
    const boxComic = document.getElementById("comic-check");
    boxComic.checked = false;
    boxComic.indeterminate = true;

    const boxRead = document.getElementById("read-check");
    boxRead.checked = false;
    boxRead.indeterminate = true;

    function updateComicCheck(event, id) {
        event.preventDefault();

        let box = document.getElementById(id);

        if (box.dataset.state === "unchecked") {
            // ☐ → -
            // console.log("1");
            box.checked = false;
            box.indeterminate = true;
            box.dataset.state = "indeterminate";
        } else if (box.dataset.state === "indeterminate") {
            // - → 🗹
            // console.log("2");
            box.checked = true;
            box.indeterminate = false;
            box.dataset.state = "checked";
        } else if (box.dataset.state === "checked") {
            // 🗹 → ☐
            // console.log("3");
            box.checked = false;
            box.indeterminate = false;
            box.dataset.state = "unchecked";
        }

        updateTable();
    }

    function filter_checks(box, book_info) {
        if (box === "unchecked") {
            // ☐
            if (book_info) {
                return false;
            }
        } else if (box === "checked") {
            // 🗹
            if (!book_info) {
                return false;
            }
        }

        return true;
    }

    function filter_book(book) {
        // Titles
        if (!book["title"].includes(document.getElementById("title-search").value)) {
            return false;
        }

        // Authors
        const author_filter = document.getElementById("authors-search").value;
        if (!book["authors"].some((author) => author.includes(author_filter))) {
            return false;
        }

        // Genres
        const genres_filter = document.getElementById("genres-search").value;
        if (!book["genres"].some((genre) => genre.includes(genres_filter))) {
            return false;
        }

        // Year
        const book_year = book["publication_year"];
        console.log(book_year);
        const year_filter_inf_str = document.getElementById("year-search-inf").value;
        const year_filter_inf = Number(year_filter_inf_str);
        if (year_filter_inf_str !== "") {
            if ((book_year === null) || (book_year < year_filter_inf)) {
                return false;
            }
        }

        const year_filter_sup_str = document.getElementById("year-search-sup").value;
        const year_filter_sup = Number(year_filter_sup_str);
        if (year_filter_sup_str !== "") {
            if ((book_year === null) || (book_year > year_filter_sup)) {
                return false;
            }
        }

        // Comic and read
        const boxComicState = document.getElementById("comic-check").dataset.state;
        const boxReadState = document.getElementById("read-check").dataset.state;

        return filter_checks(boxComicState, book["comic"]) && filter_checks(boxReadState, book["read"]);
    }

    let unfiltered_books;

    function updateTable() {
        if (unfiltered_books === undefined) {
            return;
        }
        const books = unfiltered_books.filter(filter_book);

        const maTable = document.getElementById("ma-table");
        maTable.replaceChildren();

        const started = Date.now();
        for (let book of books) {
            const new_tr = document.createElement("TR");
            maTable.appendChild(new_tr);
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const isbn = book["isbn"];

                const new_anchor = document.createElement("A");
                new_td.appendChild(new_anchor);
                new_anchor.setAttribute("href", "https://covers.openlibrary.org/b/ISBN/" + isbn + "-L.jpg");

                const new_image = document.createElement("IMG");
                new_anchor.appendChild(new_image);
                new_image.setAttribute("loading", "lazy");
                new_image.setAttribute("src", "https://covers.openlibrary.org/b/ISBN/" + isbn + "-S.jpg");
                new_image.setAttribute("height", "58px");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["title"];
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["authors"].join(", ");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["genres"].join(", ");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["publication_year"];
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const is_comic = book["comic"];
                if (is_comic) {
                    new_td.innerHTML = "<input class=\"form-check-input\" type=\"checkbox\" value=\"\" id=\"checkCheckedDisabled\" aria-label=\"Not BD\" checked disabled>";
                } else {
                    new_td.innerHTML = "<input class=\"form-check-input\" type=\"checkbox\" value=\"\" id=\"checkDisabled\" aria-label=\"BD\" disabled>";
                }
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const is_read = book["read"];
                if (is_read) {
                    new_td.innerHTML = "<input class=\"form-check-input\" type=\"checkbox\" value=\"\" id=\"checkCheckedDisabled\" aria-label=\"Not Lu\" checked disabled>";
                } else {
                    new_td.innerHTML = "<input class=\"form-check-input\" type=\"checkbox\" value=\"\" id=\"checkDisabled\" aria-label=\"Lu\" disabled>";
                }
            }
        }

        document.getElementById("footer").innerText = books.length;

        const elapsed = Date.now() - started;
        console.log(elapsed);
    }

    async function main() {
        const response = await fetch("books.json");
        unfiltered_books = await response.json();
        updateTable();
    }

    main();
</script>
