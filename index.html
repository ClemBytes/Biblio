<!DOCTYPE html>
<meta charset="utf-8">
<title>Bibliothèque de Clémentine</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<!-- <style>
    thead {position:fixed; top: 0; left: 0; }
    thead th, tfoot th { width: 100em; }
    tfoot {position:fixed; bottom: 0; left: 0; }
</style> -->
<style>td:first-child {text-align: center;}</style>

<table class="table table-hover table-dark table-striped">
    <thead>
        <tr>
            <th></th>
            <th>
                <label for="title-search">Titre</label>
            </th>
            <th>
                <label for="authors-search">Auteur(s)</label>
            </th>
            <th>
                <label for="genres-search">Genres</label>
            </th>
            <th>
                Année
            </th>
            <th>
                <label for="comic-check">BD</label>
            </th>
            <th>
                <label for="read-check">Lu</label>
            </th>
        </tr>
        <tr>
            <td></td>
            <td>
                <input type="search" id="title-search" oninput="updateTable()">
            </td>
            <td>
                <input type="search" id="authors-search" oninput="updateTable()">
            </td>
            <td>
                <input type="search" id="genres-search" oninput="updateTable()">
            </td>
            <td>
                <!-- <input type="search" id="year-search"> -->
            </td>
            <td>
                <input type="checkbox" id="comic-check" oninput="updateComicCheck(event, id='comic-check')">
            </td>
            <td>
                <input type="checkbox" id="read-check" oninput="updateComicCheck(event, id='read-check')">
            </td>
        </tr>
    </thead>
    <tbody id="ma-table" onclick="clicked(event)">
    </tbody>
    <tfoot>
        <tr>
            <th>
                Nb lines
            </th>
            <th id="footer"></th>
        </tr>
    </tfoot>
</table>


<script>
    function clicked(event) {
        console.log(event);
    }

    let boxComicState = "indeterminate";
    const boxComic = document.getElementById("comic-check");
    boxComic.checked = false;
    boxComic.indeterminate = true;

    let boxReadState = "indeterminate";
    const boxRead = document.getElementById("read-check");
    boxRead.checked = false;
    boxRead.indeterminate = true;

    function updateComicCheck(event, id) {
        event.preventDefault();

        let box;
        let state;

        if (id === "comic-check") {
            box = boxComic;
            state = boxComicState;
        } else if (id === "read-check") {
            box = boxRead;
            state = boxReadState;
        } else {
            console.log("Unknown id: " + id);
        }

        if (state === "unchecked") {
            // ☐ → -
            // console.log("1");
            box.checked = false;
            box.indeterminate = true;
            if (id === "comic-check") {
                boxComicState = "indeterminate";
            } else if (id === "read-check") {
                boxReadState = "indeterminate";
            }
        } else if (state === "indeterminate") {
            // - → 🗹
            // console.log("2");
            box.checked = true;
            box.indeterminate = false;
            if (id === "comic-check") {
                boxComicState = "checked";
            } else if (id === "read-check") {
                boxReadState = "checked";
            }
        } else if (state === "checked") {
            // 🗹 → ☐
            // console.log("3");
            box.checked = false;
            box.indeterminate = false;
            if (id === "comic-check") {
                boxComicState = "unchecked";
            } else if (id === "read-check") {
                boxReadState = "unchecked";
            }
        }

        updateTable();
    }

    function filter_book(book) {
        // Titles
        if (!book["title"].includes(document.getElementById("title-search").value)) {
            return false;
        }

        // Authors
        const author_filter = document.getElementById("authors-search").value;
        if (!book["authors"].some((author) => author.includes(author_filter))) {
            return false;
        }

        // Genres
        const genres_filter = document.getElementById("genres-search").value;
        if (!book["genres"].some((genre) => genre.includes(genres_filter))) {
            return false;
        }

        // TODO: range
        // if (!book["publication_year"].includes(document.getElementById("year-search").value)) {
        //     return false;
        // }

        // Comic
        if (boxComicState === "unchecked") {
            // ☐
            if (book["comic"]) {
                return false;
            }
        } else if (boxComicState === "checked") {
            // 🗹
            if (!book["comic"]) {
                return false;
            }
        }

        // Read
        if (boxReadState === "unchecked") {
            // ☐
            if (book["read"]) {
                return false;
            }
        } else if (boxReadState === "checked") {
            // 🗹
            if (!book["read"]) {
                return false;
            }
        }

        return true;
    }

    let unfiltered_books;

    function updateTable() {
        if (unfiltered_books === undefined) {
            return;
        }
        const books = unfiltered_books.filter(filter_book);

        const maTable = document.getElementById("ma-table");
        maTable.replaceChildren();

        const started = Date.now();
        for (let i = 0; i < books.length; i++) {
            const book = books[i];
            const new_tr = document.createElement("TR");
            maTable.appendChild(new_tr);
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const isbn = book["isbn"];

                const new_anchor = document.createElement("A");
                new_td.appendChild(new_anchor);
                new_anchor.setAttribute("href", "https://covers.openlibrary.org/b/ISBN/" + isbn + "-L.jpg");

                const new_image = document.createElement("IMG");
                new_anchor.appendChild(new_image);
                new_image.setAttribute("loading", "lazy");
                new_image.setAttribute("src", "https://covers.openlibrary.org/b/ISBN/" + isbn + "-S.jpg");
                new_image.setAttribute("height", "58px");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["title"];
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["authors"].join(", ");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["genres"].join(", ");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = book["publication_year"];
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const is_comic = book["comic"];
                if (is_comic) {
                    new_td.innerText = "🗹";
                } else {
                    new_td.innerText = "☐";
                }
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const is_read = book["read"];
                if (is_read) {
                    new_td.innerText = "🗹";
                } else {
                    new_td.innerText = "☐";
                }
            }
        }

        document.getElementById("footer").innerText = books.length;

        const elapsed = Date.now() - started;
        console.log(elapsed);
    }

    async function main() {
        const response = await fetch("books.json");
        unfiltered_books = await response.json();
        updateTable(unfiltered_books);
    }

    main();
</script>
