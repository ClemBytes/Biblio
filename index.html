<!DOCTYPE html>
<meta charset="utf-8">
<title>Bibliothèque de Clémentine</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<table class="table table-striped">
    <thead>
        <tr>
            <th>
                Titre
            </th>
            <th>
                Authors
            </th>
        </tr>
    </thead>
    <tbody id="ma-table" onclick="clicked(event)">
    </tbody>
</table>


<script>
    async function main() {
        const response = await fetch("books.json");
        const books = await response.json();

        function clicked(event) {
            console.log(event);
        }

        const maTable = document.getElementById("ma-table");

        const started = Date.now();
        for(i=0;i<books.length;i++) {
            const new_tr = document.createElement("TR");
            maTable.appendChild(new_tr);
            const new_td1 = document.createElement("TD");
            const new_td2 = document.createElement("TD");
            new_tr.appendChild(new_td1);
            new_tr.appendChild(new_td2);
            new_td1.innerText = books[i]["title"];
            new_td2.innerText = books[i]["authors"];
        }

        const elapsed = Date.now() - started;
        console.log(elapsed);
    }

    main();
</script>
