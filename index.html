<!DOCTYPE html>
<meta charset="utf-8">
<title>Bibliothèque de Clémentine</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<!-- <style>
    thead {position:fixed; top: 0; left: 0; }
    thead th, tfoot th { width: 100em; }
    tfoot {position:fixed; bottom: 0; left: 0; }
</style> -->
<style>td:first-child {text-align: center;}</style>

<table class="table table-hover table-dark table-striped">
    <thead>
        <tr>
            <th></th>
            <th>
                Titre
            </th>
            <th>
                Auteur(s)
            </th>
            <th>
                Genres
            </th>
            <th>
                Année
            </th>
            <th>
                BD
            </th>
            <th>
                Lu
            </th>
        </tr>
        <tr>
            <td></td>
            <td>
                <input type="search" id="title-search">
            </td>
            <td>
                <input type="search" id="authors-search">
            </td>
            <td>
                <input type="search" id="genres-search">
            </td>
            <td>
                <input type="search" id="year-search">
            </td>
            <td>
                BD
            </td>
            <td>
                Lu
            </th>
        </tr>
    </thead>
    <tbody id="ma-table" onclick="clicked(event)">
    </tbody>
    <tfoot>
        <tr>
            <th>
                Nb lines
            </th>
            <th id="footer"></th>
        </tr>
    </tfoot>
</table>


<script>
    function clicked(event) {
        console.log(event);
    }
    
    async function main() {
        const response = await fetch("books.json");
        const books = await response.json();

        const maTable = document.getElementById("ma-table");

        const started = Date.now();
        for(let i=0;i<books.length;i++) {
            const new_tr = document.createElement("TR");
            maTable.appendChild(new_tr);
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const isbn = books[i]["isbn"];

                const new_anchor = document.createElement("A");
                new_td.appendChild(new_anchor);
                new_anchor.setAttribute("href", "https://covers.openlibrary.org/b/ISBN/" + isbn + "-L.jpg");

                const new_image = document.createElement("IMG");
                new_anchor.appendChild(new_image);
                new_image.setAttribute("loading", "lazy");
                new_image.setAttribute("src", "https://covers.openlibrary.org/b/ISBN/" + isbn + "-S.jpg");
                new_image.setAttribute("height", "58px");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = books[i]["title"];
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = books[i]["authors"].join(", ");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = books[i]["genres"].join(", ");
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                new_td.innerText = books[i]["publication_year"];
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const is_comic = books[i]["comic"];
                if (is_comic) {
                    new_td.innerText = "🗹";
                } else {
                    new_td.innerText = "☐";
                }
            }
            {
                const new_td = document.createElement("TD");
                new_tr.appendChild(new_td);
                const is_read = books[i]["read"];
                if (is_read) {
                    new_td.innerText = "🗹";
                } else {
                    new_td.innerText = "☐";
                }
            }
        }

        document.getElementById("footer").innerText = books.length;

        const elapsed = Date.now() - started;
        console.log(elapsed);
    }

    main();
</script>
